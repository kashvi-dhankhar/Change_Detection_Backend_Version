<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Change Detection</title>

  <!-- ✅ Correct Flask static CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>

  <!-- Detect Change Button -->
  <button id="detectBtn" class="detect-btn">
    Detect Change
  </button>

  <!-- Sidebar -->
  <div id="sidebar" class="sidebar">

    <h3>Change Detection</h3>

    <label>
      AOI / KML
      <input type="file" id="kmlFile" />
    </label>

    <label>
      Start Date
      <input type="date" id="fromDate" />
    </label>

    <label>
      End Date
      <input type="date" id="toDate" />
    </label>

    <button id="startBtn" class="start-btn">
      Start Detection
    </button>

    <!-- Status text -->
    <p id="status" class="status-text hidden"></p>

    <!-- GeoJSON Output -->
    <div id="geojsonOutput" class="geojson-container hidden">
      <h4>Result</h4>
      <pre id="geojsonContent"></pre>
    </div>

  </div>

  <!-- ✅ Correct Flask static JS -->
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>

</body>
</html>
